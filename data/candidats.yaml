- id: Koulm
  nom: Koulm STEPHAN"
  bio: "Né à Kergrist-Moëlou, j’ai repris la ferme familiale en 2011. Mes parents étaient déjà investis au conseil municipal en tant que conseillers et premier adjoint, et m’ont transmis leur sens du collectif. J’ai ainsi été trésorier de l’Association des parents d’élèves pendant plusieurs années, président de l’Association des producteurs de plants et de pommes de terre biologiques de consommation de Bretagne (Aval-Douar Beo), et je préside actuellement le syndicat des producteurs de plants de pomme de terre Bretagne Armor. Je suis fier de mener cette liste, qui rassemble plusieurs générations, des profils variés et des compétences complémentaires. Nous pensons qu’il est important de dépasser les différences pour se rassembler autour de l’essentiel : faire de Kergrist-Moëlou une commune accueillante, solidaire, dynamique et tournée vers l’avenir."
  photo: /images/liste/koulm-stephan.webp

- id: AnneSophie
  nom: "Anne-Sophie OUDIN"
  bio: "Installée depuis 30 ans sur la belle commune de Kergrist-Moëlou où j'ai élevé mes trois enfants, j'ai travaillé à Rostrenen puis à Carhaix dans un organisme de formation. Directrice de cette association pendant 23 ans, j'y ai accompagné des personnes à des moments de leur vie, parfois difficile, où elles devaient changer de métier et se réorienter. J'ai aussi oeuvré à la mise en place de projets dans le Kreiz Breizh, comme l'expérimentation Territoire Zéro chômeur de longue durée. Bénévole dans plusieurs associations, la vie associative m'a appris qu'on a besoin des forces de chacune et chacun pour avancer individuellement et collectivement. Aujourd'hui, je souhaite m'investir pour le bien commun et l'avenir de ma commune, aux côtés de celles et ceuxqui le souhaitent."
  photo: "/images/liste/anne-sophie-oudin.webp"

- id: Steven
  nom: "Steven GÉRARD"
  bio: "Je m’appelle Steven Gérard, j’ai 32 ans et travaille comme ouvrier paysagiste à Gouarec. Arrivé à Kergrist-Moëlou en 2015, je suis père de deux enfants qui sont tous les deux scolarisés à l'école de la commune. Je suis investi dans plusieurs associations, au niveau départemental et à l'échelle locale. J’aimerais contribuer à préserver notre cadre de vie (notamment le bocage), et à dynamiser les bourgs de Kergrist et de Saint-Lubin. Les points que j'aimerais faire aboutir sont la rénovation de l'école et l’amélioration de la voirie."
  photo: "/images/liste/steven-gerard.webp"

- id: Anna
  nom: "Anna CORBEL"
  bio: "Je m’appelle Anna Corbel, 33 ans, maman de deux enfants, j’habite à Lustruyen où nous rénovons la maison familiale de mes grands-parents. Orthophoniste de profession, je suis sensible aux liens intergénérationnels, à l’union dépassant les différences. Attachée à la vie de notre commune, je souhaite m’investir pour nous faire vivre ensemble des moments de partage, culturels et solidaires. Je m’impliquerai donc principalement dans les domaines social et culturel. Mon souhait d’agir prend racine dans mes plus anciens souvenirs au sein de la commune : les jeux du pardon de Saint-Lubin, de l’Isle ou encore « Couleur des champs ». J’entends encore résonner la voix de Job Lamer, le speaker. Et j’ai toujours la peluche donnée par Yves Gestin et Job André, les arbitres des multiples jeux. J’ai grandi dans un Kergrist actif associativement, rythmé par les rencontres et les projets communs. Notre campagne se vide, gardons l’âme solidaire et accueillante qui nous caractérise. Je suis profondément attachée à notre commune, à ses habitants et à son avenir. Le 15 mars, votons CULTIVONS NOTRE AVENIR ! Deomp de’i evit Kergrist"
  photo: "/images/liste/anna-corbel.webp"

- id: Roland
  nom: "Roland LE CAM"
  bio: "Voilà 35 ans que je me suis installé dans la commune avec mon épouse en rénovant une petite maison de ferme inhabitée. Nous sommes tous deux investis depuis longtemps dans la vie associative communale, au comité de jumelage irlandais dont mon épouse Nathalie fut présidente, mais également au comité des fêtes de Saint-Lubin dans lequel j’ai été vice-président pendant 15 ans, secondant les présidents Laurent Le Corre puis Peter Mickelborough, à l’époque des chars du Carnaval, des brocantes et surtout de Rock-Moëlou dont j’ai activement participé à la création et à la production des 5 éditions de 2007 à 2011. Je suis actuellement retraité, après avoir été directeur d’école publique pendant 30 ans (5 ans à Kergrist, puis 25 ans à Rostrenen). J’ai effectué plusieurs mandats de délégué du personnel élu syndical, siégeant dans les instances départementales des Côtes d’Armor. Durant le premier mandat de Martine Connan, Maire de Kergrist-Moëlou, j’ai créé, rédigé et mis en page, bénévolement et sans être élu municipal, tous les bulletins communaux de 2001 à 2008. Je suis actuellement membre actif du comité de jumelage entre Kergrist-Moëlou et les villages irlandais. Je souhaite m’investir dans ma commune avec tous les Kergristois de bonne volonté dans le but d'une gestion citoyenne et partagée."
  photo: "/images/liste/roland-le-cam.webp"

- id: Ines
  nom: "Inès LÉRAUD"
  bio: "Arrivée en Centre-Bretagne pour mon travail il y a plus de 10 ans, j'y suis restée et me suis fixée dans la belle commune de Kergrist-Moëlou. J'ai été séduite par la solidarité qui unit les gens d'ici et qui fait l'identité de ce territoire. Je suis convaincue que, collectivement, les citoyennes et les citoyens peuvent reprendre prise sur leur avenir. Mon métier de journaliste a été pour moi une manière de faire vivre la démocratie, en mettant l'information au service du bien commun. En 2021, j'ai reçu le prix de l'association Anticor, qui lutte contre la corruption dans la vie publique. Ce sont ces valeurs qui m'ont guidée quand j'ai cofondé, la même année, le média breton d’investigation Splann!. Financé par les citoyens, ce média propose une information gratuite et indépendante, notamment sur des sujets liés à l’environnement et à la santé, des enjeux qui me tiennent particulièrement à cœur. Mon métier m’a aussi permis de mieux comprendre les réalités d’un territoire rural comme le nôtre : ses difficultés, mais aussi ses ressources et ses forces. En Centre-Bretagne, les fermes disparaissent, et l’accès à la santé ne cesse de se dégrader. À mon échelle, j’essaie d’œuvrer de différentes manières pour améliorer cette situation. Je suis cogérante de la SCI de Trémargat, qui rachète des terres pour faciliter l'installation de jeunes agriculteurs. J'ai réussi à convaincre un jeune médecin de s’installer à Rostrenen, qui y exerce maintenant depuis plusieurs années. Aujourd’hui, je souhaite prolonger cet engagement au sein de la formidable équipe de « Cultivons notre avenir à Kergrist-Moëlou », pour le vivre-ensemble et la démocratie locale !"
  photo: "/images/liste/ines-leraud.webp"

- id: Serge
  nom: "Serge BÉGOT"
  bio: "Retraité depuis peu après des postes de direction en collège et lycée de l'académie de Normandie, je me suis installé à Kergrist, dans un bien acquis en 2020. Disponible pour être au service des habitants, j'ai effectué deux mandats d'élu, le premier dans une commune de 3000 habitants dans le Finistère en 1990 et le deuxième dans une commune de 1000 habitants dans le département de l'Eure en 2014."
  photo: "/images/liste/serge-begot.webp"

- id: Sabrina
  nom: "Sabrina COL"
  bio: "Je suis maman de deux filles, dont l’aînée est scolarisée à l’école de la commune, ce qui m’a naturellement amenée à m’impliquer dans la vie locale. Je suis aujourd’hui trésorière de l’Association des parents d’élèves, un engagement qui me permet de contribuer concrètement au quotidien des enfants et de leurs familles, mais aussi de travailler en lien avec les acteurs de la commune. Monteuse vidéo de métier, je m’intéresse particulièrement aux questions de communication, mais aussi à tout ce qui touche à l’enfance, à la vie associative, au cadre de vie et à l’environnement. J’ai rejoint la liste « Cultivons Notre Avenir à Kergrist-Moëlou » avec l’envie de participer activement à une commune vivante, solidaire et attentive à ses habitants, où chacun peut trouver sa place et s’engager pour l'avenir de notre commune."
  photo: "/images/liste/sabrina-col.webp"

- id: Leandre
  nom: "Léandre MANDARD"
  bio: "Après avoir exercé plusieurs années comme professeur d'histoire et un passage par le lycée de Kernilien, je suis actuellement en cours d’installation agricole à Kergrist-Moëlou. Ayant grandi dans une exploitation laitière, je suis profondément attaché au monde agricole et à la vie rurale. Convaincu que nous avons une grande chance d'avoir une culture bretonne vivante en Centre-Bretagne, je suis engagé depuis plusieurs années au conseil d’administration de Radio Kreiz Breizh, je joue de l’accordéon dans les festoù-noz et je m’intéresse au breton tel qu’on le parle ici. Je pense que c’est à l'échelle communale que l’on peut concrètement améliorer la vie de toutes et tous. Je rejoins la liste « Cultivons notre avenir à Kergrist-Moëlou » car je suis persuadé que le sérieux et l'esprit collectif de cette équipe mèneront notre commune sur la bonne voie. Je compte notamment participer à la mise en valeur du patrimoine."
  photo: "/images/liste/leandre-mandard.webp"

- id: Alice
  nom: "Alice Sternberg"
  bio: "Dès mon arrivée en Centre-Bretagne, il y a 10 ans, j'ai ressenti un attachement très fort pour ce territoire, son identité, ses paysages et sa culture. Professeure de philosophie, j'ai enseigné à Pontivy, Saint-Brieuc et Rostrenen. Après m’être formée à l'herboristerie et m’être investie dans l’association Cicindèle, j’ai décidé de vivre de ma passion et de quitter mon métier d’enseignante pour créer un nouveau commerce à Rostrenen. Mon ambition était de créer un lieu de vie convivial et accueillant, et de rendre populaires et accessibles l’herboristerie et les plantes médicinales. Avec ma collègue Tanya Simon, nous nous sommes lancées dans cette aventure il y a bientôt 3 ans, en octobre 2023, en créant le café-herboristerie La Ronce. Aujourd'hui, j'ai envie de continuer à m'investir dans mon territoire. Cela me tient à coeur de participer à la vie de ma commune et à une dynamique collective, de soutenir toutes les belles initiatives qui y sont déjà présentes et toutes celles à venir. J'aime travailler en équipe, faire le lien entre les gens, suivre des projets et les mener à bien."
  photo: "/images/liste/alice-sternberg.webp"

- id: JeanNicolas
  nom: "Jean-Nicolas BÉASSE"
  bio: "J’ai fait le choix de m’installer en famille à Kergrist attiré par la qualité du cadre de vie et le lien social fort et je n’ai pas été déçu ! Mon métier consiste à financer des projets/entreprises ayant un impact positif (environnemental, social) au bénéfice de l’intérêt général. Animé par cette dynamique, je me suis déjà impliqué en centre Bretagne dans des projets de développement économique, d’énergies renouvelables ou de transmission agricole. J’ai aussi une expérience d’élu du personnel en entreprise et de bénévole associatif. La future équipe municipale aura la chance d’hériter d’une commune aux finances saines (faible niveau d’endettement) lui donnant une marge de manœuvre pour financer un ou plusieurs projets structurants au cours des 7 prochaines années. Je serai attentif à rendre intelligibles pour tous les habitants les enjeux financiers pour que nous fassions collectivement des choix éclairés. Je serai aussi force de proposition pour aller chercher des sources de financement alternatives (subventions notamment)."
  photo: "/images/liste/jean-nicolas-beasse.webp"

- id: Adriane
  nom: "Adriane BUCKULCIK"
  bio: "J’ai 40 ans, et au fil de ma vie professionnelle, j’ai été gestionnaire de paie, assistante de gestion, référente certification qualité et entrepreneuse dans le service à la personne. Ces expériences m’ont rendue attentive au droit social, soucieuse des gens et de la qualité du service que l’on rend. Installée ici avec mes enfants, je suis attachée à Kergrist-Moëlou et au Kreiz Breizh, à ses paysages, à sa tranquillité et à la solidarité entre habitants. En situation de handicap invisible, je suis particulièrement sensible aux questions d’accessibilité, d'entraide et à la place que chacun peut trouver. J’ai rejoint la liste « Cultivons notre avenir à Kergrist-Moëlou » parce que je crois à une commune où l’on s’écoute et où les décisions se construisent avec les habitants, en pensant à demain. Heureuse de participer à cette aventure collective au service de notre commune."
  photo: "/images/liste/adriane-buckulcik.webp"

- id: Alexis
  nom: "Alexis ROCHE"
  bio: "J'ai 55 ans, je suis installé à Kergrist-Moëlou depuis 2019 avec ma petite famille. Je télé-travaille dans l'informatique en tant qu'administrateur de bases de données pour un grand groupe hôtelier. Je suis venu chercher un cadre de vie agréable, un coin de nature et depuis mon arrivée, je me suis engagé dans la vie associative locale, étant actuellement co-gestionnaire d'une épicerie associative et entraîneur bénévole au club de tennis de table de Corlay. Je me suis engagé sur cette liste car je crois à la concertation avec la population dans les prises de décisions importantes pour un avenir prometteur pour notre commune."
  photo: "/images/liste/alexis-roche.webp"

- id: Julie
  nom: Julie POISSON
  bio: "Habitante de Kergrist depuis 2020, mes 2 enfants sont scolarisés sur la commune. Ingénieur agronome et énergéticienne du bâtiment de formation, je suis actuellement chargée de mission au sein de la Fédération Bretonne des Filières Biosourcées qui promeut l’usage de matériaux biosourcés et locaux dans la construction. J’ai rejoint la liste « Cultivons notre avenir à Kergrist-Moëlou » avec l’envie de mettre mes compétences de gestion de projets en construction et rénovation au service de la commune. Je suis en particulier attachée au projet de rénovation de l’école. Il me tient également à cœur de proposer des méthodes d’information et de concertation qui permettent à chacun.e de se sentir écouté.e, de prendre des décisions en intelligence collective, de développer un esprit de communauté, de mettre en lumière ce qui rassemble plutôt que ce qui divise. Kergrist est riche de tellement de belles personnes et de compétences, il ne tient qu’à nous de savoir mobiliser pleinement ce potentiel !"
  photo: "/images/liste/julie-poisson.webp"

- id: Franck
  nom: "Franck LE BOEDEC"
  bio: "J'ai 56 ans, je suis marié et père de deux enfants. Je suis facteur sur la commune de Kergrist-Moëlou. Installé sur la commune depuis 1998, j'ai choisi de rejoindre cette liste pour m'engager avec simplicité et bon sens au service de tous les habitants. Passionné par la culture bretonne à travers la langue, la danse et l'histoire, je suis attaché aux traditions et à la qualité de vie qui font la richesse de notre commune. Betek an trec’h !"
  photo: "/images/liste/franck-le-boedec.webp"

- id: Carine
  nom: Carine BONNET
  bio: "Après avoir parcouru une partie de la France, j'ai posé mes valises, il y a plusieurs années maintenant, à Kergrist-Moëlou dans une maison que je rénove. J'y ai trouvé le calme, la tranquillité et le contact rapproché avec la nature. J'aime l'âme sauvage du Kreiz Breizh ! Mon parcours professionnel allant de la diététique à la pâtisserie en passant par l'environnement m'a permis de développer une certaine polyvalence et une capacité à travailler avec des publics variés. Je suis sensible aux questions de santé, de bien-être et d'environnement. Porteuse d'un handicap invisible, intégrer la liste « Cultivons notre avenir à Kergrist-Moëlou » a été un défi. Au sein de cette équipe, j'ai pu trouver bienveillance, entraide et solidarité, des valeurs qui nous sont chères. Je souhaite m'investir, mettre mon énergie afin que notre commune soit vivante, accueillante, diversifiée, solidaire et unie."
  photo: "/images/liste/carine-bonnet.webp"

- id: Jerome
  nom: "Jérôme LETORT"
  bio: "Âgé de 50 ans et installé à Kergrist-Moëlou, je monte actuellement une activité de réparation de machines et d’équipements mécaniques, comme autoentrepreneur. J’ai rejoint la liste « Cultivons l’avenir à Kergrist-Moëlou » car, étant très attaché aux valeurs d’action citoyenne et de solidarité, je suis convaincu que cette équipe permettra aux habitants de Kergrist d’agir collectivement et concrètement pour le bien commun."
  photo: "/images/liste/jerome-letort.webp"
